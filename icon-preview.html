<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { background: #333; display: flex; gap: 40px; padding: 40px; align-items: flex-start; font-family: monospace; color: #999; }
  .item { display: flex; flex-direction: column; gap: 12px; align-items: center; }
  img, object { width: 256px; height: 256px; border-radius: 48px; }
  .small { display: flex; gap: 16px; align-items: center; margin-top: 8px; }
  .small img, .small object { width: 64px; height: 64px; border-radius: 12px; }
  .tiny img, .tiny object { width: 32px; height: 32px; border-radius: 6px; }
</style>
</head>
<body>

<div class="item">
  <div>PNG (original)</div>
  <img src="/nobsif-icon.png">
  <div class="small">
    <img src="/nobsif-icon.png">
    <div class="tiny"><img src="/nobsif-icon.png"></div>
  </div>
</div>

<div class="item">
  <div>SVG (new)</div>
  <img src="/nobsif-icon.svg">
  <div class="small">
    <img src="/nobsif-icon.svg">
    <div class="tiny"><img src="/nobsif-icon.svg"></div>
  </div>
</div>

</body>
</html>
